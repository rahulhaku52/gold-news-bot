name: XAUUSD Analysis Poster

on:
  schedule:
    - cron: '0 */2 * * *'   # প্রতি ৪ ঘণ্টায়
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install requests yfinance pandas numpy google-generativeai
      - name: Run analysis
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python analysis_bot.py
